---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-vip
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: kube-vip
  targetNamespace: kube-system
  storageNamespace: kube-system
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/kube-vip-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
