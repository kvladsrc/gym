---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: ingress-nginx
  targetNamespace: ingress-nginx
  storageNamespace: ingress-nginx
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/ingress-nginx-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
