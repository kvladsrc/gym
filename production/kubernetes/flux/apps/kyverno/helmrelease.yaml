---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  releaseName: kyverno
  targetNamespace: kyverno
  storageNamespace: kyverno
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/kyverno-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
