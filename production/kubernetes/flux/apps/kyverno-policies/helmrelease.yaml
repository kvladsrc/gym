---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno-policies
  namespace: flux-system
spec:
  releaseName: kyverno-policies
  targetNamespace: kyverno
  storageNamespace: kyverno
  interval: 10m
  dependsOn:
    - name: kyverno
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/kyverno-policies
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
