---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: minio
  targetNamespace: minio
  storageNamespace: minio
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/minio-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: minio-secrets
      valuesKey: values.yaml
  dependsOn:
    - name: ingress-nginx
    - name: nfs
