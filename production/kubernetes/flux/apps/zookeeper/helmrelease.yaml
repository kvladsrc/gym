---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zookeeper
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: zookeeper
  targetNamespace: zookeeper
  storageNamespace: zookeeper
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/zookeeper-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: zookeeper-tls
