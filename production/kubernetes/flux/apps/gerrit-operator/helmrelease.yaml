---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gerrit-operator
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: gerrit-operator
  targetNamespace: gerrit-operator
  storageNamespace: gerrit-operator
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/gerrit-operator-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
