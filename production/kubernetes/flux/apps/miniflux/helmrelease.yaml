---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miniflux
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: miniflux
  targetNamespace: miniflux
  storageNamespace: miniflux
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/miniflux-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: miniflux-secrets
      valuesKey: values.yaml
  dependsOn:
    - name: postgresql
