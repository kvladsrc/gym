---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-event-exporter
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: kubernetes-event-exporter
  targetNamespace: kubernetes-event-exporter
  storageNamespace: kubernetes-event-exporter
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/kubernetes-event-exporter
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
  dependsOn:
    - name: ntfy
