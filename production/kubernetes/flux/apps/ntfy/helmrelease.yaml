---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: ntfy
  targetNamespace: ntfy
  storageNamespace: ntfy
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/ntfy
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
  dependsOn:
    - name: nfs
