---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  releaseName: redis
  targetNamespace: redis
  storageNamespace: redis
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/redis-wrapper
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: redis-secrets
      valuesKey: values.yaml
