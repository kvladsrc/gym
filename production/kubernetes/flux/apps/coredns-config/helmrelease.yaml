---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns-config
  namespace: flux-system
spec:
  install:
    createNamespace: true
  releaseName: coredns-config
  targetNamespace: kube-system
  storageNamespace: kube-system
  interval: 10m
  chart:
    spec:
      chart: ./production/kubernetes/helm-charts/coredns-config
      sourceRef:
        kind: GitRepository
        name: gerrit
        namespace: flux-system
