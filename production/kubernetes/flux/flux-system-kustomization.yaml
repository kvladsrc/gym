---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: gerrit
  path: ./production/kubernetes/flux
  interval: 10m
  timeout: 5m
  prune: true
  wait: true

  decryption:
    provider: sops
    secretRef:
      name: sops-age
