---
buildbuddy:
  disk:
    data:
      enabled: false

  service:
    type: LoadBalancer
    loadBalancerIP: "192.168.1.221"
    externalHTTPPort: 80
    externalGRPCPort: 1985
    externalHTTPSPort: ""
    externalGRPCSPort: ""

  config:
    app:
      build_buddy_url: "http://bb.your.domain"
      events_api_url: "grpc://bb-grpc.your.domain"
      cache_api_url: "grpc://bb-grpc.your.domain"
    storage:
      ttl_seconds: 2592000
      chunk_file_size_bytes: 3000000
      aws_s3:
        endpoint: "http://minio.minio.svc.cluster.local:9000"
        s3_force_path_style: true
        region: "us-east-1"
        bucket: "buildbuddy"
        static_credentials_id: ""
        static_credentials_secret: ""

  ingress:
    enabled: false
