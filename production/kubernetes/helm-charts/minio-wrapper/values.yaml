---
minio:
  # Root credentials - will be set via secret
  rootUser: ""
  rootPassword: ""

  # Enable persistence for terraform state storage
  persistence:
    storageClass: "nfs-client"
    enabled: true
    size: 10Gi

  # Enable ingress for API and console
  ingress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: ca-issuer
      kubernetes.io/ingress.class: "nginx"
    hosts:
      - store.your.domain
    tls:
      - hosts:
          - store.your.domain
        secretName: minio-api-ingress-tls # pragma: allowlist secret
  # Console ingress (UI)
  consoleIngress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: ca-issuer
      kubernetes.io/ingress.class: "nginx"
    hosts:
      - s3.your.domain
    tls:
      - hosts:
          - s3.your.domain
        secretName: minio-console-ingress-tls # pragma: allowlist secret

  # OAuth2 Authentik configuration
  environment:
    # OpenID Connect configuration
    MINIO_IDENTITY_OPENID_CONFIG_URL: >-
      https://sso.your.domain/application/o/minio/.well-known/openid-configuration
    MINIO_IDENTITY_OPENID_CLIENT_ID: "minio-oauth2-client"
    MINIO_IDENTITY_OPENID_DISPLAY_NAME: "authentik"
    MINIO_IDENTITY_OPENID_REDIRECT_URI: >-
      https://s3.your.domain/oauth_callback

  # Create bucket for terraform state
  buckets:
    - name: terraform-state
      policy: none
      purge: false

  # Resources for terraform state operations
  resources:
    requests:
      memory: 256Mi
      ephemeral-storage: 50Mi
      cpu: 100m
    limits:
      memory: 512Mi
      ephemeral-storage: 2Gi
      cpu: 500m

  # Mode - standalone for simple deployment
  mode: standalone

  # Trusted CA certificate for cert-manager
  trustedCertsSecret: minio-ca-cert # pragma: allowlist secret

