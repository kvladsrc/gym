---
# nxs values cannot safely render this Secret while the private key is supplied
# by Flux as top-level SOPS values; the nxs subchart tpl context cannot access it.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ssh.secretName }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
type: Opaque
stringData:
  id_ed25519: |
{{ .Values.ssh.keys.id_ed25519 | indent 4 }}
  id_ed25519.pub: |
{{ index .Values.ssh.keys "id_ed25519.pub" | indent 4 }}
  config: |
    Host review.your.domain 192.168.1.220
      StrictHostKeyChecking no
      UserKnownHostsFile /dev/null
