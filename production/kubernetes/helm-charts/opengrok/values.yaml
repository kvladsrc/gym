---
nxs:
  releasePrefix: "-"

  generic:
    podSecurityContext:
      fsGroup: 1111
    usePredefinedAffinity: false

  serviceAccount:
    opengrok:
      automountServiceAccountToken: true

  pvcs:
    opengrok-data-pvc:
      accessModes:
        - ReadWriteMany
      size: 10Gi
      storageClassName: nfs-client
    opengrok-src-pvc:
      accessModes:
        - ReadWriteMany
      size: 10Gi
      storageClassName: nfs-client

  deployments:
    opengrok:
      replicas: 1
      serviceAccountName: opengrok
      automountServiceAccountToken: true
      containers:
        opengrok:
          image: opengrok/docker
          imageTag: latest
          imagePullPolicy: Always
          env:
            - name: SYNC_PERIOD_MINUTES
              value: "30"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          resources: {}
          volumeMounts:
            - name: data
              mountPath: /opengrok/data
            - name: src
              mountPath: /opengrok/src
            - name: ssh
              mountPath: /home/appuser/.ssh
              readOnly: true
      volumes:
        - name: data
          type: pvc
          originalName: opengrok-data-pvc
        - name: src
          type: pvc
          originalName: opengrok-src-pvc
      extraVolumes:
        - name: ssh
          secret:
            secretName: opengrok-ssh  # pragma: allowlist secret
            defaultMode: 0400

  services:
    opengrok:
      type: ClusterIP
      ports:
        - name: http
          port: 8080
          targetPort: http
          protocol: TCP
