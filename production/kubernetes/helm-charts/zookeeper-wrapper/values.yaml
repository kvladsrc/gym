---
zookeeper:
  image:
    repository: bitnamilegacy/zookeeper
  usePasswordFiles: false
  global:
    defaultStorageClass: "nfs-client"
    security:
      allowInsecureImages: true
  replicaCount: 1
  auth:
    enabled: false
  tls:
    client:
      enabled: true
      auth: none
      autoGenerated: false
      existingSecret: "zookeeper-secret" # pragma: allowlist secret
    quorum:
      enabled: true
      auth: none
      autoGenerated: false
      existingSecret: "zookeeper-secret" # pragma: allowlist secret
  resourcesPreset: "none"
  persistence:
    enabled: true
    size: 10Gi
  service:
    type: ClusterIP

# TLS certificate values
caCrt: null
tlsCrt: null
tlsKey: null
