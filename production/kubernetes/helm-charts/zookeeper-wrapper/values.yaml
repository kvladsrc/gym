---
zookeeper:
  image:
    repository: bitnamilegacy/zookeeper
  usePasswordFiles: false
  global:
    defaultStorageClass: "nfs-client"
    security:
      allowInsecureImages: true
  replicaCount: 1
  auth:
    enabled: false
  tls:
    client:
      enabled: true
      auth: none
      autoGenerated: false
      existingSecret: "{{ .Release.Name }}-tls"
      # Overrided by secrets engine
      keystorePassword: "changeme"    # pragma: allowlist secret
      truststorePassword: "changeme"  # pragma: allowlist secret
    quorum:
      enabled: true
      auth: none
      autoGenerated: false
      existingSecret: "{{ .Release.Name }}-tls"
      # Overrided by secrets engine
      keystorePassword: "changeme"    # pragma: allowlist secret
      truststorePassword: "changeme"  # pragma: allowlist secret
  resourcesPreset: "none"
  persistence:
    enabled: true
    size: 10Gi
  service:
    type: ClusterIP

# Cert-manager integration for automatic TLS certificate management
certManager:
  # Enable cert-manager integration
  enabled: true

  # Overrided by secrets engine
  keystorePassword: "changeme"  # pragma: allowlist secret

  # Optional: Override default secret name (default: {{ .Release.Name
  # }}-tls)
  # secretName: "custom-secret-name"

  # Required: Issuer reference (name is required, kind defaults to
  # ClusterIssuer)
  issuerName: "ca-issuer"
  # issuerKind: "ClusterIssuer" # Uncomment if different kind is
  # needed

  # Optional: Override default certificate name (default: {{
  # .Release.Name }}-tls)
  # certificateName: "custom-cert-name"

  # Optional: Certificate duration and renew settings (cert-manager
  # defaults are usually sufficient)
  # duration: "2160h"  # 90 days
  # renewBefore: "360h"  # 15 days before expiration

  # Optional: Private key settings
  # keySize: 2048  # RSA key size

  # Optional: Additional DNS names for certificate
  # additionalDnsNames: []
