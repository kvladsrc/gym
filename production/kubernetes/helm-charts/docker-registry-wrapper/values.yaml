---
docker-registry:
  replicaCount: 1

  ingress:
    enabled: true
    className: nginx
    path: /
    hosts:
      - registry.your.domain
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/proxy-body-size: "0"

  garbageCollect:
    enabled: true
    deleteUntagged: true
    schedule: "0 * * * *"

  # Disable filesystem persistence, using S3 instead
  persistence:
    enabled: false

  # Use S3 storage (MinIO) instead of filesystem
  storage: s3

  # S3 configuration for MinIO
  s3:
    region: us-east-1
    regionEndpoint: http://minio.minio.svc.cluster.local:9000
    bucket: registry
    encrypt: false
    secure: false
    skipverify: true
    forcepathstyle: true

  secrets:
    s3:
      accessKey: ""
      secretKey: ""

  configData:
    storage:
      redirect:
        disable: true
