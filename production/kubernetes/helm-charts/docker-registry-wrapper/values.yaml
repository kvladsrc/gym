---
docker-registry:
  replicaCount: 1

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  ingress:
    enabled: false
    className: ""
    path: /
    hosts:
      - registry.your.domain
    annotations: {}
    tls:
      - secretName: docker-registry-tls # pragma: allowlist secret
        hosts:
          - registry.your.domain
  garbageCollect:
    enabled: true
    deleteUntagged: true
    schedule: "0 * * * *"

  # Disable filesystem persistence, using S3 instead
  persistence:
    enabled: false

  # Use S3 storage (MinIO) instead of filesystem
  storage: s3

  # S3 configuration for MinIO
  s3:
    region: us-east-1
    regionEndpoint: http://minio.minio.svc.cluster.local:9000
    bucket: registry
    encrypt: false
    secure: false
    skipverify: true
    forcepathstyle: true

  secrets:
    s3:
      accessKey: ""
      secretKey: ""

  configData:
    storage:
      delete:
        enabled: true
      redirect:
        disable: true
