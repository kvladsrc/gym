---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: edge-http-redirect
  namespace: {{ .Values.gateway.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: http
  hostnames:
{{- range concat .Values.hosts.direct .Values.hosts.authentikProxy }}
    - {{ . | quote }}
{{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-server
  namespace: authentik
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https
  hostnames:
    - "sso.your.domain"
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-proxy-apps
  namespace: authentik
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https
  hostnames:
{{- range .Values.hosts.authentikProxy }}
    - {{ . | quote }}
{{- end }}
  rules:
    - backendRefs:
        - name: ak-outpost-terraform-managed-outpost
          port: 9000
---
apiVersion: gateway.networking.k8s.io/v1
