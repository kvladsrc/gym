---
nxs:
  releasePrefix: "-"

  generic:
    hookAnnotations: null
    podSecurityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch
    usePredefinedAffinity: false

  pvcs:
    jupyter-work:
      accessModes:
        - ReadWriteOnce
      size: 5Gi
      storageClassName: nfs-client

  deployments:
    jupyter-cpp:
      replicas: 1
      automountServiceAccountToken: false
      strategy:
        type: Recreate
      containers:
        jupyter-cpp:
          image: docker.io/datainpoint/xeus-cling-notebook
          imageTag: "latest"
          imagePullPolicy: IfNotPresent
          args:
            - start-notebook.sh
            - --NotebookApp.token=
            - --NotebookApp.password=
            - --NotebookApp.allow_remote_access=True
            - --NotebookApp.trust_xheaders=True
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 100
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: work
              mountPath: /home/jovyan/work
      volumes:
        - name: work
          type: pvc
          originalName: jupyter-work

  services:
    jupyter-cpp:
      type: ClusterIP
      ports:
        - name: http
          port: 8888
          targetPort: http
          protocol: TCP
