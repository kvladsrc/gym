kanboard:
  image:
    registry: docker.io
    repository: kanboard/kanboard
    tag: "latest"

  application:
    port: 80
    env:
      # Enable reverse proxy authentication (authentik forward auth)
      - name: REVERSE_PROXY_AUTH
        value: "true"
      # Header sent by authentik containing the authenticated username
      # X-authentik-username → PHP $_SERVER → HTTP_X_AUTHENTIK_USERNAME
      - name: REVERSE_PROXY_USER_HEADER
        value: "HTTP_X_AUTHENTIK_USERNAME"
      # Mandatory since Kanboard 1.2.49: trusted proxy CIDR(s)
      - name: TRUSTED_PROXY_NETWORKS
        value: "10.0.0.0/8"
    persistence:
      enabled: true
      persistentVolumeClaim:
        name: kanboard-pvc
        create: true
        storageClass: "nfs-client"
        size: 5Gi
        accessMode: ReadWriteOnce

  service:
    enabled: true
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
