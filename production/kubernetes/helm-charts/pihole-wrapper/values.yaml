---
pihole:
  replicaCount: 1

  image:
    repository: pihole/pihole
    tag: "latest"

  # Timezone
  timezone: "Europe/Warsaw"

  # Upstream DNS servers
  DNS1: "8.8.8.8"
  DNS2: "8.8.4.4"

  # Persistence for /etc/pihole and /etc/dnsmasq.d
  persistentVolumeClaim:
    enabled: false

  # Disable ingress — access via Authentik proxy
  ingress:
    enabled: false

  # DNS service — static IP via kube-vip LoadBalancer
  serviceDns:
    type: LoadBalancer
    loadBalancerIP: "192.168.1.222"

  probes:
    liveness:
      command:
        - /bin/sh
        - -c
        - "dig @127.0.0.1 pi.hole A +short +time=2 +tries=1 | grep -q ."
      failureThreshold: 3
      initialDelaySeconds: 60
      timeoutSeconds: 5
    readiness:
      command:
        - /bin/sh
        - -c
        - "dig @127.0.0.1 pi.hole A +short +time=2 +tries=1 | grep -q ."
      failureThreshold: 2
      initialDelaySeconds: 60
      timeoutSeconds: 5

  # Web UI
  serviceWeb:
    type: ClusterIP

  # Allow DNS queries from all interfaces (including Tailscale 100.x.x.x)
  extraEnvVars:
    DNSMASQ_LISTENING: "all"
    FTLCONF_webserver_api_max_sessions: 64

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
