pihole:
  replicaCount: 1

  image:
    repository: pihole/pihole
    tag: "latest"

  # Timezone
  timezone: "Europe/Warsaw"

  # Upstream DNS servers
  DNS1: "8.8.8.8"
  DNS2: "8.8.4.4"

  # Persistence for /etc/pihole and /etc/dnsmasq.d
  persistentVolumeClaim:
    enabled: true
    storageClass: "nfs-client"
    size: 1Gi

  # Disable ingress — access via Authentik proxy
  ingress:
    enabled: false

  # Local DNS records (migrated from CoreDNS hosts block)
  dnsmasq:
    customDnsEntries:
      # ingress-nginx (.220)
      - address=/api.your.domain/192.168.1.220
      - address=/b.your.domain/192.168.1.220
      - address=/ci.your.domain/192.168.1.220
      - address=/review.your.domain/192.168.1.220
      - address=/search.your.domain/192.168.1.220
      - address=/dns.your.domain/192.168.1.220
      - address=/feed.your.domain/192.168.1.220
      - address=/hedgedoc.your.domain/192.168.1.220
      - address=/logs.your.domain/192.168.1.220
      - address=/read.your.domain/192.168.1.220
      - address=/registry.your.domain/192.168.1.220
      - address=/sql.your.domain/192.168.1.220
      - address=/sso.your.domain/192.168.1.220
      - address=/zz.your.domain/192.168.1.220
      # buildbuddy (.221)
      - address=/bb-grpc.your.domain/192.168.1.221
      - address=/bb.your.domain/192.168.1.221

  # DNS service — static IP via kube-vip LoadBalancer
  serviceDns:
    type: LoadBalancer
    loadBalancerIP: "192.168.1.222"

  # Web UI
  serviceWeb:
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
