---
env: &hedgedocEnv
  # Basic configuration
  CMD_DOMAIN: "hedgedoc.your.domain"
  CMD_URL_ADDPORT: "false"
  CMD_PROTOCOL_USESSL: "true"

  # Upload configuration
  CMD_ALLOW_FREEURL: "true"
  CMD_ALLOW_ANONYMOUS: "false"
  CMD_ALLOW_ANONYMOUS_EDITS: "false"

  # OAuth2 / Authentik configuration
  # You need to create an OAuth2/OpenID provider in Authentik first
  CMD_OAUTH2_PROVIDERNAME: "Authentik"
  CMD_OAUTH2_CLIENT_ID: "271wmrr5X5pPDMWB7WG4a3LUrRAaUUaM8ILHiPba"
  CMD_OAUTH2_AUTHORIZATION_URL: >-
    https://sso.your.domain/application/o/authorize/
  CMD_OAUTH2_TOKEN_URL: >-
    http://authentik-server.authentik.svc.cluster.local/application/o/token/
  CMD_OAUTH2_USER_PROFILE_URL: >-
    http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
  CMD_OAUTH2_USER_PROFILE_USERNAME_ATTR: "preferred_username"
  CMD_OAUTH2_USER_PROFILE_DISPLAY_NAME_ATTR: "name"
  CMD_OAUTH2_USER_PROFILE_EMAIL_ATTR: "email"
  CMD_OAUTH2_SCOPE: "openid profile email"

nxs:
  releasePrefix: "-"

  generic:
    hookAnnotations: null
    usePredefinedAffinity: false

  pvcs:
    hedgedoc-uploads:
      accessModes:
        - ReadWriteOnce
      size: 2Gi
      storageClassName: nfs-client

  secrets:
    hedgedoc-env:
      data: *hedgedocEnv

  deployments:
    hedgedoc:
      replicas: 1
      containers:
        hedgedoc:
          image: quay.io/hedgedoc/hedgedoc
          imageTag: latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: hedgedoc-env
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: uploads
              mountPath: /hedgedoc/public/uploads
      volumes:
        - name: uploads
          type: pvc
          originalName: hedgedoc-uploads

  services:
    hedgedoc:
      type: ClusterIP
      ports:
        - name: http
          port: 3000
          targetPort: http
          protocol: TCP
