---
metrics-server:
  replicas: 1

  defaultArgs:
    - --cert-dir=/tmp
    - --kubelet-preferred-address-types=InternalIP,Hostname
    - --kubelet-use-node-status-port
    - --metric-resolution=30s

  args:
    - --kubelet-insecure-tls

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
