---
# nxs values cannot render this Secret because the database URI is supplied by
# Flux as top-level SOPS values; the nxs subchart tpl context cannot access it.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.secretName }}
  labels:
    {{- include "zuul.labels" . | nindent 4 }}
type: Opaque
stringData:
  # yamllint disable rule:line-length
  dburi: {{ .Values.database.uri }}
  # yamllint enable rule:line-length
---
# nxs values cannot render this Secret because the Gerrit SSH key is supplied by
# Flux as top-level SOPS values; the nxs subchart tpl context cannot access it.
apiVersion: v1
kind: Secret
metadata:
  name: gerrit-secrets
  labels:
    {{- include "zuul.labels" . | nindent 4 }}
type: Opaque
stringData:
  user: {{ .Values.gerrit.user }}
  sshkey: |
{{ .Values.gerrit.sshKey | indent 4 }}
---
# nxs values cannot render this Secret without moving tenant configuration under
# the nxs subchart values; keep it here until the Zuul config model is flattened.
apiVersion: v1
kind: Secret
metadata:
  name: zuul-tenant-config
  labels:
    {{- include "zuul.labels" . | nindent 4 }}
type: Opaque
stringData:
  main.yaml: |
{{ .Values.zuul.tenantConfig | indent 4 }}
