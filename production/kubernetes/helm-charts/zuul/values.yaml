---
gerrit:
  server: review.your.domain
  user: zuul

zuul:
  imagePrefix: quay.io/zuul-ci
  zuulImageVersion: latest
  nodepoolImageVersion: latest

  zookeeper:
    hosts: zookeeper.zookeeper.svc.cluster.local:3181
    secretName: "zookeeper-tls"  # pragma: allowlist secret
    tls:
      ca: /tls/client/ca.crt
      cert: /tls/client/tls.crt
      key: /tls/client/tls.key
    certManager:
      enabled: true
      issuerName: "ca-issuer"
      # issuerKind: "ClusterIssuer"
      keystorePassword: "changeme"  # pragma: allowlist secret
      # duration: "2160h0m0s"
      # renewBefore: "360h0m0s"
      # keySize: 2048
      # additionalDnsNames: []

  scheduler:
    count: 1
    storageSize: 80Gi
    storageClassName: ""
    config:
      secretName: zuul-tenant-config  # pragma: allowlist secret

  executor:
    count: 1
    terminationGracePeriodSeconds: 21600
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    sshkey:
      secretName: gerrit-secrets  # pragma: allowlist secret

  web:
    count: 1
    statusUrl: https://ci.your.domain

  fingergw:
    count: 1

  nodepool:
    resources:
      requests:
        cpu: 25m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 512Mi
    webapp:
      port: 8005
    probes:
      readiness:
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
      liveness:
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 3
        failureThreshold: 3
    providers:
      - name: dev-k8s

  connections:
    gerrit:
      driver: gerrit
      server: review.your.domain
      user: zuul
      secretName: gerrit-secrets  # pragma: allowlist secret
      baseurl: http://review.your.domain

  tenantConfig: |
    - tenant:
        name: your.domain
        web-root: https://ci.your.domain/t/your.domain/
        source:
          gerrit:
            config-projects:
              - zuul-config
            untrusted-projects:
              - src

  nodepoolConfig: |
    labels:
      - name: build-node
    providers:
      - name: dev-k8s
        driver: kubernetes
        context: admin-cluster.local
        pools:
          - name: main
            labels:
              - name: build-node
                type: pod
                image: registry.your.domain/build:1.0
                image-pull: Always
                volumes:
                  - name: pre-commit-cache
                    nfs:
                      server: 192.168.1.185
                      path: /srv/nfs/pre-commit-cache
                  - name: nix-store
                    nfs:
                      server: 192.168.1.185
                      path: /srv/nfs/nix
                volume-mounts:
                  - name: pre-commit-cache
                    mountPath: /root/.cache/pre-commit
                  - name: nix-store
                    mountPath: /nix

database:
  secretName: creds  # pragma: allowlist secret

nxs:
  releasePrefix: "-"

  generic:
    usePredefinedAffinity: false

  statefulSets:
    zuul-scheduler:
      replicas: 1
      serviceName: zuul-scheduler
      extraSelectorLabels:
        app.kubernetes.io/component: zuul-scheduler
        app.kubernetes.io/part-of: zuul
      labels:
        app.kubernetes.io/component: zuul-scheduler
        app.kubernetes.io/part-of: zuul
      containers:
        scheduler:
          image: quay.io/zuul-ci/zuul-scheduler
          imageTag: latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 25m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          args:
            - /usr/local/bin/zuul-scheduler
            - -f
            - -d
          env:
            - name: KUBECONFIG
              value: /etc/kubernetes/kube.config
          volumeMounts:
            - name: zuul-config
              mountPath: /etc/zuul
              readOnly: true
            - name: zuul-tenant-config
              mountPath: /etc/zuul/tenant
              readOnly: true
            - name: zuul-scheduler
              mountPath: /var/lib/zuul
            - name: zookeeper-client-tls
              mountPath: /tls/client
              readOnly: true
            - name: connection-gerrit
              mountPath: /etc/zuul/connections/gerrit
              readOnly: true
      volumes:
        - name: zuul-config
          type: secret
          originalName: zuul-config
        - name: zuul-tenant-config
          type: secret
          originalName: zuul-tenant-config
        - name: zookeeper-client-tls
          type: secret
          originalName: zookeeper-tls
        - name: connection-gerrit
          type: secret
          originalName: gerrit-secrets
      volumeClaimTemplates:
        - metadata:
            name: zuul-scheduler
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 80Gi
    zuul-executor:
      replicas: 1
      serviceName: zuul-executor
      extraSelectorLabels:
        app.kubernetes.io/component: zuul-executor
        app.kubernetes.io/part-of: zuul
      labels:
        app.kubernetes.io/component: zuul-executor
        app.kubernetes.io/part-of: zuul
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
      terminationGracePeriodSeconds: 30
      containers:
        executor:
          image: quay.io/zuul-ci/zuul-executor
          imageTag: latest
          imagePullPolicy: Always
          args:
            - /usr/local/bin/zuul-executor
            - -f
            - -d
          env:
            - name: ZUUL_EXECUTOR_SIGTERM_GRACEFUL
              value: "1"
          ports:
            - containerPort: 7900
              name: logs
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            privileged: true
          volumeMounts:
            - name: zuul-config
              mountPath: /etc/zuul
            - name: zuul-var
              mountPath: /var/lib/zuul
            - name: nodepool-private-key
              mountPath: /etc/zuul/sshkey
            - name: zookeeper-client-tls
              mountPath: /tls/client
              readOnly: true
            - name: connection-gerrit
              mountPath: /etc/zuul/connections/gerrit
              readOnly: true
      volumes:
        - name: zuul-var
          type: emptyDir
        - name: zuul-config
          type: secret
          originalName: zuul-config
        - name: zookeeper-client-tls
          type: secret
          originalName: zookeeper-tls
        - name: nodepool-private-key
          type: secret
          originalName: gerrit-secrets
        - name: connection-gerrit
          type: secret
          originalName: gerrit-secrets

  deployments:
    zuul-fingergw:
      replicas: 1
      extraSelectorLabels:
        app.kubernetes.io/component: zuul-fingergw
        app.kubernetes.io/part-of: zuul
      labels:
        app.kubernetes.io/component: zuul-fingergw
        app.kubernetes.io/part-of: zuul
      terminationGracePeriodSeconds: 30
      containers:
        fingergw:
          image: quay.io/zuul-ci/zuul-fingergw
          imageTag: latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 25m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 9079
              name: zuul-fingergw
              protocol: TCP
          volumeMounts:
            - name: zuul-config
              mountPath: /etc/zuul
            - name: zookeeper-client-tls
              mountPath: /tls/client
              readOnly: true
      volumes:
        - name: zuul-config
          type: secret
          originalName: zuul-config
        - name: zookeeper-client-tls
          type: secret
          originalName: zookeeper-tls
    zuul-web:
      replicas: 1
      extraSelectorLabels:
        app.kubernetes.io/component: zuul-web
        app.kubernetes.io/part-of: zuul
      labels:
        app.kubernetes.io/component: zuul-web
        app.kubernetes.io/part-of: zuul
      terminationGracePeriodSeconds: 30
      containers:
        web:
          image: quay.io/zuul-ci/zuul-web
          imageTag: latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 25m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: KUBECONFIG
              value: /etc/kubernetes/kube.config
          ports:
            - containerPort: 9000
              name: zuul-web
              protocol: TCP
          volumeMounts:
            - name: zuul-config
              mountPath: /etc/zuul
            - name: zookeeper-client-tls
              mountPath: /tls/client
              readOnly: true
      volumes:
        - name: zuul-config
          type: secret
          originalName: zuul-config
        - name: zookeeper-client-tls
          type: secret
          originalName: zookeeper-tls

  services:
    zuul-executor:
      clusterIP: None
      extraSelectorLabels:
        app.kubernetes.io/component: zuul-executor
        app.kubernetes.io/part-of: zuul
      ports:
        - name: logs
          port: 7900
          protocol: TCP
          targetPort: logs
    zuul-scheduler:
      disabled: true
    zuul-fingergw:
      type: NodePort
      extraSelectorLabels:
        app.kubernetes.io/component: zuul-fingergw
        app.kubernetes.io/part-of: zuul
      ports:
        - name: zuul-fingergw
          port: 9079
          protocol: TCP
          targetPort: zuul-fingergw
    zuul-web:
      type: NodePort
      extraSelectorLabels:
        app.kubernetes.io/component: zuul-web
        app.kubernetes.io/part-of: zuul
      ports:
        - name: zuul-web
          port: 9000
          protocol: TCP
          targetPort: zuul-web
