---
- hosts: all
  gather_facts: false

  vars:
    image_repo: registry.your.domain/build
    image_tag: "rc-{{ zuul.commit_id }}"
    image_promote_target_tag: current
    image_promote_require_source: false

  tasks:
    - name: Promote the build-node image
      ansible.builtin.include_tasks:
        file: tasks/promote-container-image.yaml
