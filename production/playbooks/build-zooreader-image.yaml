---
- hosts: all
  gather_facts: false

  vars:
    repo_dir: "{{ ansible_env.HOME }}/{{ zuul.project.src_dir }}"
    image_repo: registry.your.domain/zooreader
    image_tag: "rc-{{ zuul.commit_id }}"
    image_build_context: "{{ repo_dir }}/production/docker/zooreader"

  tasks:
    - name: Build and push the Zooreader image
      ansible.builtin.include_tasks:
        file: tasks/build-container-image.yaml
