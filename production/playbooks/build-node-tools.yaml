---
- hosts: all
  gather_facts: false

  vars:
    repo_dir: "{{ ansible_env.HOME }}/{{ zuul.project.src_dir }}"

  tasks:
    - name: Show Zuul job context
      ansible.builtin.debug:
        var: zuul

    - name: Build the patchset-local build-node tools
      ansible.builtin.command:
        argv:
          - /nix/var/nix/profiles/default/bin/nix
          - build
          - .#buildNodeTools
          - --out-link
          - /opt/build-node-tools
          - --max-jobs
          - auto
          - --print-build-logs
        chdir: "{{ repo_dir }}/production/docker/build-node"
      changed_when: true
