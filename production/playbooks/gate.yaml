---
- hosts: all
  gather_facts: false
  vars:
    repo_dir: "{{ ansible_env.HOME }}/{{ zuul.project.src_dir }}"
    bazel_relevant_patterns:
      - '^cpp/'
      - '^BUILD\.bazel$'
      - '^MODULE\.bazel'
      - '^\.bazelrc'
    has_bazel_changes: >-
      {{
        zuul['change']['files'] | default([])
        | select('search', bazel_relevant_patterns | join('|'))
        | list | length > 0
      }}
  tasks:
    - name: Check for relevant changes
      debug:
        msg: >-
          {% if has_bazel_changes %}
          Relevant changes found, running bazel tasks.
          {% else %}
          No relevant changes, skipping bazel tasks.
          {% endif %}

    - name: Run bazel build
      shell: >
        bazelisk build //...
        --verbose_failures
        --sandbox_debug
      args:
        chdir: "{{ repo_dir }}"
      when: has_bazel_changes

    - name: Run bazel test
      shell: >
        bazelisk test //...
        --verbose_failures
        --sandbox_debug
      args:
        chdir: "{{ repo_dir }}"
      when: has_bazel_changes

    - name: Run bazel test (ASan)
      shell: >
        bazelisk test //...
        --config=asan
        --verbose_failures
        --sandbox_debug
        --test_output=errors
      args:
        chdir: "{{ repo_dir }}"
      when: has_bazel_changes

    - name: Run bazel test (UBSan)
      shell: >
        bazelisk test //...
        --config=ubsan
        --verbose_failures
        --sandbox_debug
        --test_output=errors
      args:
        chdir: "{{ repo_dir }}"
      when: has_bazel_changes

    - name: Run bazel test (TSan)
      shell: >
        bazelisk test //...
        --config=tsan
        --verbose_failures
        --sandbox_debug
        --test_output=errors
      args:
        chdir: "{{ repo_dir }}"
      when: has_bazel_changes
