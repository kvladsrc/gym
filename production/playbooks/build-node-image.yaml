---
- hosts: all
  gather_facts: false

  vars:
    repo_dir: "{{ ansible_env.HOME }}/{{ zuul.project.src_dir }}"
    image_repo: registry.your.domain/build
    image_tag: "rc-{{ zuul.commit_id }}"
    image_build_context: "{{ repo_dir }}/production/docker/build-node"
    image_build_volumes:
      - /nix:/nix

  tasks:
    - name: Build and push the build-node image
      ansible.builtin.include_tasks:
        file: tasks/build-container-image.yaml
