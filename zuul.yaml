---
- job:
    name: pre-submit-check
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check.yaml

- job:
    name: pre-submit-check-go
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check-go.yaml

- job:
    name: pre-submit-check-coverage
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check-coverage.yaml

- job:
    name: helm-chart-version-check
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check-helm-chart-versions.yaml

- job:
    name: bazel-test-gate
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/gate.yaml

- job:
    name: renovate-bot
    parent: renovate-base

- project:
    check:
      jobs:
        - pre-submit-check
        - pre-submit-check-go
        - helm-chart-version-check
    gate:
      jobs:
        - pre-submit-check-coverage
        - bazel-test-gate
    daily:
      jobs:
        - renovate-bot
