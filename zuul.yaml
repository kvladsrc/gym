---
- job:
    name: src-base
    parent: base
    abstract: true
    pre-run: production/playbooks/build-node-tools.yaml

- job:
    name: pre-submit-check
    parent: src-base
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check.yaml

- job:
    name: pre-submit-check-go
    parent: src-base
    files:
      - ^.*\.go$
      - ^go\.(mod|sum)$
      - ^go\.work(\.sum)?$
      - ^\.golangci\.ya?ml$
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check-go.yaml

- job:
    name: pre-submit-check-coverage
    parent: src-base
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check-coverage.yaml
    files:
      - ^cpp/warmup/

- job:
    name: helm-chart-version-check
    parent: src-base
    files:
      - ^production/kubernetes/helm-charts/
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/check-helm-chart-versions.yaml

- job:
    name: bazel-test-gate
    parent: src-base
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/gate.yaml
    files:
      - ^cpp/
      - ^BUILD\.bazel$
      - ^MODULE\.bazel
      - ^\.bazelrc

- job:
    name: build-node-image
    parent: src-base
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/build-node-image.yaml
    files:
      - ^production/docker/build-node/

- job:
    name: promote-build-node-image
    parent: src-base
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/promote-build-node-image.yaml
    files:
      - ^production/docker/build-node/

- job:
    name: build-zooreader-image
    parent: src-base
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/build-zooreader-image.yaml
    files:
      - ^production/docker/zooreader/

- job:
    name: promote-zooreader-image
    parent: src-base
    post-run: production/playbooks/notify-ntfy-on-failure.yaml
    run: production/playbooks/promote-zooreader-image.yaml
    files:
      - ^production/docker/zooreader/

- job:
    name: renovate-bot
    parent: renovate-base
    pre-run: production/playbooks/build-node-tools.yaml

- project:
    check:
      jobs:
        - pre-submit-check
        - pre-submit-check-go
        - helm-chart-version-check
    gate:
      jobs:
        - noop
        - build-node-image
        - build-zooreader-image
        - pre-submit-check-coverage
        - bazel-test-gate
    promote:
      jobs:
        - promote-build-node-image
        - promote-zooreader-image
    daily:
      jobs:
        - renovate-bot
