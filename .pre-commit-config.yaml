# yamllint disable rule:line-length
---
minimum_pre_commit_version: "3.5.0"

default_language_version:
  python: python3.14

# Ignore generated or vendor folders
exclude: |
  (?x)
  (^\.git/)|
  (^\.codex/)|
  (^archive/)|
  (^production/kubernetes/talos/)|
  (?:^|/)vendor/|
  (?:^|/)third_party/|
  (.*_gtest\.cc$)|
  (^third_party/)|
  (^node_modules/)

repos:
  # TODO(myuser): Uncommend ASAP
  # - repo: https://github.com/NixOS/nixfmt
  #   rev: v1.3.1
  #   hooks:
  #     - id: nixfmt

  # ---------- Elisp files ----------
  - repo: https://github.com/jamescherti/pre-commit-elisp
    rev: v1.0.9
    hooks:
      - id: elisp-check-parens
      - id: elisp-indent

  # ---------- Bazel files ----------
  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 8.5.1
    hooks:
      - id: buildifier
        args:
          - --warnings=all
      - id: buildifier-lint
        args:
          - --warnings=all

  # ---------- Generic sanity checks ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        exclude: |
          (?x)
          (^static/)|
          (assets/)
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: forbid-new-submodules
      - id: mixed-line-ending
      - id: trailing-whitespace

  # ---------- C++ checks ----------
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
      - id: cppcheck
        args:
          - --check-level=exhaustive
          - --suppress=missingInclude
          - --suppress=missingIncludeSystem
          - --suppress=unusedStructMember
          - --suppress=unusedFunction
          - --suppress=constParameterCallback
          - --enable=style
      - id: cpplint
        args:
          - --filter=-legal/copyright,-build/header_guard,-build/include_order,-build/c++17

  # ---------- Documentation & markup ----------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: "\\.(cjs|js|jsx|mjs|ts|tsx|json|css|scss|html)$"

  # ---------- YAML quality ----------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        exclude: |
          (?x)
          (^production/kubernetes/helm-charts/.+/templates/)|
          (^production/kubernetes/flux/infrastructure/flux-system/gotk-components.yaml)

  # ---------- Shell scripts ----------
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["-i", "4", "-s", "-w"]

  # ---------- Dockerfiles ----------
  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: [--ignore, DL3008, --ignore, DL3018]

  # ---------- Secret scanning ----------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: |
          (?x)
          (^cothic/assets/)|
          (^production/kubernetes/helm-charts/.+/(secrets\.yaml|secrets\.mock\.yaml))|
          (^production/kubernetes/flux/secrets/.+\.yaml)|
          (^production/terraform/.+/secrets\.yaml)

  # ---------- Go ----------
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-lint
      - id: go-imports
      - id: go-cyclo
        args: [-over=15]
      - id: go-critic
      - id: go-mod-tidy

  # ---------- OpenTofu ----------
  - repo: https://github.com/tofuutils/pre-commit-opentofu
    rev: v2.4.2
    hooks:
      - id: tofu_fmt
        files: ^production/terraform/
      - id: tofu_validate
        files: ^production/terraform/
      - id: tofu_tflint
        files: ^production/terraform/

  # ---------- Checkov ----------
  - repo: https://github.com/bridgecrewio/checkov.git
    rev: '3.3.8'
    hooks:
      - id: checkov
